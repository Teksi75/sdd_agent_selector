<!DOCTYPE html>
<!--
  SDD Agent Selector V4
  ============================================================================
  Source of truth: openspec/changes/2026-07-04-sdd-model-picker-refactor/

  V3 visual reference (do NOT modify during V4 development):
    ../Modelos SDD - V3 - Lucide.html
  The V3 monolith lives outside this repo (in the parent SDD/ directory)
  to keep this PR focused on the V4 refactor. For local dev, copy it as
  `v3-monolith-backup.html` to the project root to enable the data-integrity
  regression test. CI sets `SDD_V3_BACKUP_PATH` for the same effect.
  SHA256 of the V3 source: 8A89DE6C262ED3D1B7EB3DBFAB95E43FA1B6CAD87DFD088DE0C678D5AAB26FBD

  Pipeline (Phase 1):
    data/*.json → js/services/data-loader.js (fetch + sessionStorage cache)
                → js/services/model-scorer.js (pure scoring + selection)
                → js/components/ref-table.js (pilot section, this PR)
                → js/app.js (bootstrap)
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SDD Agent Selector V4 — selector modular de modelos SDD" />
  <title>SDD Agent Selector V4</title>

  <!-- Phase 0: Tailwind CDN como placeholder.
       Phase 4 va a bundlear Tailwind offline vía esbuild + PostCSS.
       Fuente de verdad: openspec/changes/2026-07-04-sdd-model-picker-refactor/ -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Placeholder para tokens.css (Phase 1):
       <link rel="stylesheet" href="css/tokens.css" /> -->
</head>
<body class="bg-surface text-on-surface">
  <div id="app">
    <!-- Phase 1 pilot section — ref-table.
         The mount div is intentionally placed in <main> so the rest of the
         page can grow around it without the ref-table re-locating. -->
    <main class="mx-auto max-w-6xl px-6 py-8 space-y-6">
      <header class="space-y-1">
        <h1 class="text-2xl font-bold text-slate-100">SDD Agent Selector V4 — Ref-Table (Phase 1 pilot)</h1>
        <p class="text-sm text-slate-400">
          Tabla de modelos activos, ordenada por score compuesto. Modelos de referencia (tier=reference) se excluyen.
          Fuente de verdad visual: <code class="text-xs">v3-monolith-backup.html</code>.
        </p>
      </header>
      <section id="ref-table-mount" aria-label="Tabla de modelos activos"></section>
    </main>
    <noscript>
      <p>Esta app necesita JavaScript habilitado para funcionar.</p>
    </noscript>
  </div>

  <script type="module" src="js/app.js"></script>
