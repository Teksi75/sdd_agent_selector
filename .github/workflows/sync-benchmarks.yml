# .github/workflows/sync-benchmarks.yml
# Phase 3 — auto-sync data layer from upstream sources.
#
# Schedule: every 5 days at 00:00 UTC (cron: `0 0 */5 * *`)
# Manual:   workflow_dispatch with an optional `scraper` input to
#           run a single scraper in isolation (for debugging).
#
# Flow:
#   1. Each scraper runs against `data/models.json` (fetch + parse + write).
#   2. Scraper exits 0 = OK (with or without changes), 1 = hard error.
#   3. Per-scraper jobs run in parallel; the merge job collects artifacts
#      and commits data/models.json with [skip ci] when any scraper made
#      changes.
#
# The [skip ci] tag prevents an infinite loop where the auto-sync commit
# re-triggers this workflow.

name: sync-benchmarks

on:
  schedule:
    # Every 5 days at 00:00 UTC. GitHub cron has a quirk where */5 on
    # day-of-month uses UTC time, so this fires on days 1, 6, 11, 16, 21,
    # 26 of each month.
    - cron: '0 0 */5 * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Optional — run only this scraper (e.g. scrape-anthropic-pricing). Leave blank to run all.'
        required: false
        type: string

concurrency:
  group: sync-benchmarks
  cancel-in-progress: false

jobs:
  scrape:
    name: scrape (${{ matrix.scraper }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scraper:
          - scrape-opencode-prices
          - scrape-openai-pricing
          - scrape-anthropic-pricing
          - scrape-arena-leaderboard
          - scrape-glm-blog
          - scrape-swebench-leaderboard
    steps:
      - name: Skip if manual dispatch targeted a different scraper
        id: gate
        run: |
          if [ -n "${{ inputs.scraper }}" ] && [ "${{ inputs.scraper }}" != "${{ matrix.scraper }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
      - name: Setup Node 20
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ${{ matrix.scraper }} (dry-run for inspection)
        if: steps.gate.outputs.skip != 'true'
        run: node scripts/${{ matrix.scraper }}.js --dry-run
        continue-on-error: true
      - name: Run ${{ matrix.scraper }} (live — writes data/models.json)
        if: steps.gate.outputs.skip != 'true'
        run: node scripts/${{ matrix.scraper }}.js
        continue-on-error: true
      - name: Check for diff
        if: steps.gate.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet data/models.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload updated data/models.json
        if: steps.gate.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: models-${{ matrix.scraper }}
          path: data/models.json
          retention-days: 1

  commit:
    name: commit (if changes)
    runs-on: ubuntu-latest
    needs: scrape
    if: success() && github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can `git diff` cleanly.
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: models-*
          merge-multiple: true
      - name: Apply the freshest artifact (if any)
        id: apply
        run: |
          if [ -f artifacts/data/models.json ]; then
            cp artifacts/data/models.json data/models.json
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit changes [skip ci]
        if: steps.apply.outputs.applied == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/models.json
          git commit -m 'chore(sync): refresh data/models.json from upstream [skip ci]'
          git push