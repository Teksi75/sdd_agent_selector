# .github/workflows/sync-benchmarks.yml
# Phase 3 — auto-sync data layer from upstream sources.
#
# Schedule: every 5 days at 00:00 UTC (cron: `0 0 */5 * *`)
# Manual:   workflow_dispatch with an optional `scraper` input to
#           run a single scraper in isolation (for debugging).
#
# Flow (single job, one checkout, sequential scrapers):
#   1. Checkout the repo once.
#   2. For each scraper in SCRAPERS (in order): run --dry-run, then run live.
#      Each scraper reads + writes data/models.json. Sequential execution
#      avoids the previous parallel-matrix race where two scrapers
#      truncated or clobbered each other's edits on the same file.
#      Each scraper's non-zero exit is logged as a warning — the rest of
#      the pipeline still runs so a single upstream outage doesn't block
#      the cron.
#   3. Validate data/models.json structurally (parse + _meta + non-empty
#      `models` object).
#   4. Commit data/models.json with [skip ci] ONLY if `git diff` reports
#      changes; otherwise exit cleanly with a "no changes" log.
#
# The [skip ci] tag prevents an infinite loop where the auto-sync commit
# re-triggers this workflow.

name: sync-benchmarks

on:
  schedule:
    # Every 5 days at 00:00 UTC. GitHub cron has a quirk where */5 on
    # day-of-month uses UTC time, so this fires on days 1, 6, 11, 16, 21,
    # 26 of each month.
    - cron: '0 0 */5 * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Optional — run only this scraper (e.g., scrape-anthropic-pricing). Leave blank to run all.'
        required: false
        type: string

concurrency:
  group: sync-benchmarks
  cancel-in-progress: false

# Required to git push the auto-sync commit; also avoids the
# default GITHUB_TOKEN read-only fallback that newer repos enforce.
permissions:
  contents: write

jobs:
  sync:
    name: sync (sequential)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can `git diff` cleanly and detect a no-op.
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve scraper list
        id: scrapers
        run: |
          ALL_SCRAPERS=(
            scrape-opencode-prices
            scrape-openai-pricing
            scrape-anthropic-pricing
            scrape-arena-leaderboard
            scrape-glm-blog
            scrape-swebench-leaderboard
          )
          if [ -n "${{ inputs.scraper }}" ]; then
            SELECTED=()
            for s in "${ALL_SCRAPERS[@]}"; do
              if [ "$s" = "${{ inputs.scraper }}" ]; then
                SELECTED+=("$s")
              fi
            done
            if [ ${#SELECTED[@]} -eq 0 ]; then
              echo "::error::Unknown scraper '${{ inputs.scraper }}'. Expected one of: ${ALL_SCRAPERS[*]}"
              exit 1
            fi
            SCRAPERS=("${SELECTED[@]}")
          else
            SCRAPERS=("${ALL_SCRAPERS[@]}")
          fi
          {
            echo "list<<EOF"
            printf '%s\n' "${SCRAPERS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Scraper list (${#SCRAPERS[@]}):"
          printf '  - %s\n' "${SCRAPERS[@]}"

      - name: Run scrapers sequentially (dry-run, then live)
        env:
          SCRAPER_LIST: ${{ steps.scrapers.outputs.list }}
        run: |
          set -u
          failed=0
          while IFS= read -r scraper; do
            [ -z "$scraper" ] && continue
            echo "::group::[$scraper] dry-run"
            if ! node "scripts/${scraper}.js" --dry-run; then
              echo "::warning::$scraper dry-run failed — continuing to live run"
            fi
            echo "::endgroup::"

            echo "::group::[$scraper] live"
            if ! node "scripts/${scraper}.js"; then
              echo "::warning::$scraper live run failed — continuing to next scraper"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done <<< "$SCRAPER_LIST"
          echo "Scraper run complete — $failed scraper(s) reported errors (non-fatal)."

      - name: Validate data/models.json after all scrapers
        run: |
          node -e "
            const fs = require('fs');
            const path = 'data/models.json';
            let raw;
            try { raw = fs.readFileSync(path, 'utf8'); }
            catch (e) { console.error('validation failed:', path, 'is missing:', e.message); process.exit(1); }
            let parsed;
            try { parsed = JSON.parse(raw); }
            catch (e) { console.error('validation failed:', path, 'is not valid JSON:', e.message); process.exit(1); }
            if (!parsed || typeof parsed !== 'object') {
              console.error('validation failed:', path, 'top-level is not an object');
              process.exit(1);
            }
            if (!parsed._meta || typeof parsed._meta.schemaVersion !== 'number') {
              console.error('validation failed:', path, '_meta.schemaVersion is missing or not a number');
              process.exit(1);
            }
            if (!parsed.models || typeof parsed.models !== 'object') {
              console.error('validation failed:', path, 'is missing the top-level \`models\` object');
              process.exit(1);
            }
            const n = Object.keys(parsed.models).length;
            if (n === 0) {
              console.error('validation failed:', path, 'has zero models');
              process.exit(1);
            }
            console.log('validation OK —', path, 'has', n, 'model entries');
          "

      - name: Commit changes [skip ci] (only if diff is non-empty)
        # Scheduled runs auto-commit + push the refreshed data layer.
        # Manual `workflow_dispatch` runs DO NOT auto-push: they may be
        # one-scraper debug runs whose partial output shouldn't land on main.
        # Debug-run committers should push themselves after inspecting diff.
        if: github.event_name == 'schedule'
        run: |
          if git diff --quiet data/models.json; then
            echo "No changes to data/models.json — skipping commit."
            exit 0
          fi
          echo "Changes detected — committing data/models.json."
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/models.json
          git commit -m 'chore(sync): refresh data/models.json from upstream [skip ci]'
          git push